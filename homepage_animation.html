<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EYEBROWZR</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #070714;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* SCENE */
    #scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(740px, 95vw);
    }

    /* MONITOR CONTAINER */
    #monitor-wrap {
      position: relative;
      width: 100%;
    }
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      display: block;
      position: relative;
      z-index: 5;
      filter: drop-shadow(0 0 8px #ff00c8) drop-shadow(0 0 20px #ff00c8);
    }

    /* SCREEN — 16:10 ratio matching GIF dimensions 800x500 */
    #screen {
      position: absolute;
      top: 13.33%;
      left: 10.27%;
      width: 80%;
      aspect-ratio: 8 / 5;
      overflow: hidden;
      z-index: 3;
    }

    #screen img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      image-rendering: pixelated;
      display: none;
    }

    #screen img.active {
      display: block;
    }

    /* KEYBOARD PANEL */
    #keyboard {
      width: 100%;
      background: transparent;
      border: none;
      height: 70px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      position: relative;
      z-index: 2;
    }

    .splash-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.5rem, 1.5vw, 0.65rem);
      letter-spacing: 2px;
      background: transparent;
      padding: 0.7rem 1.5rem;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.2s;
    }

    #init-btn {
      color: #00ff41;
      border-color: #00ff41;
      text-shadow: 0 0 8px #00ff41;
      animation: btnpulse 2s infinite;
    }
    #init-btn:hover { background: rgba(0,255,65,0.08); }
    #init-btn:disabled { opacity: 0.3; cursor: not-allowed; animation: none; }
    @keyframes btnpulse {
      0%,100%{ box-shadow: 0 0 10px rgba(0,255,65,0.2); }
      50%{ box-shadow: 0 0 22px rgba(0,255,65,0.5); }
    }

    #deactivate-btn {
      color: #ff00c8;
      border-color: #ff00c8;
      text-shadow: 0 0 8px #ff00c8;
      display: none;
      animation: deactivatepulse 2s infinite;
    }
    #deactivate-btn:hover { background: rgba(255,0,200,0.08); }
    #deactivate-btn:disabled { opacity: 0.3; cursor: not-allowed; animation: none; }
    @keyframes deactivatepulse {
      0%,100%{ box-shadow: 0 0 10px rgba(255,0,200,0.2); }
      50%{ box-shadow: 0 0 22px rgba(255,0,200,0.5); }
    }

    /* MUTE */
    #mute-btn {
      position: fixed;
      top: 1rem; right: 1rem;
      background: transparent;
      border: 1px solid rgba(0,245,255,0.25);
      color: rgba(0,245,255,0.5);
      font-size: 1rem;
      padding: 0.35rem 0.55rem;
      cursor: pointer;
      border-radius: 4px;
      z-index: 500;
      transition: all 0.2s;
    }
    #mute-btn:hover { color: #00f5ff; border-color: #00f5ff; }
  </style>
</head>
<body>

<button id="mute-btn"></button>

<div id="scene">

  <div id="monitor-wrap">
    <img id="bezel" src="computer_monitor.png" alt="monitor"/>
    <div id="screen">
      <img id="gif-idle"     src="computer_monitor_idle_animation.gif"    alt="idle"/>
      <img id="gif-intro"    src="homepage_wiretrace_and_arm_sequence.gif" alt="intro"/>
      <img id="gif-active"   src="homepage_active_idle.gif"               alt="active"/>
      <img id="gif-retract"  src="homepage_retract_sequence.gif"          alt="retract"/>
    </div>
  </div>

  <div id="keyboard">
    <button class="splash-btn" id="init-btn">[ INITIALIZE ]</button>
    <button class="splash-btn" id="deactivate-btn">[ DEACTIVATE ]</button>
  </div>

</div>

<script>
  const INTRO_DURATION   = 8000;
  const RETRACT_DURATION = 5000;

  const gifIdle    = document.getElementById('gif-idle');
  const gifIntro   = document.getElementById('gif-intro');
  const gifActive  = document.getElementById('gif-active');
  const gifRetract = document.getElementById('gif-retract');
  const initBtn    = document.getElementById('init-btn');
  const deactBtn   = document.getElementById('deactivate-btn');

  // Show idle on load
  gifIdle.classList.add('active');

  function restartGif(el) {
    const src = el.src;
    el.src = '';
    el.src = src;
  }

  function showOnly(el) {
    [gifIdle, gifIntro, gifActive, gifRetract].forEach(g => {
      g.classList.remove('active');
    });
    el.classList.add('active');
  }

  //  MUTE 
  let muted = false;
  document.getElementById('mute-btn').onclick = () => {
    muted = !muted;
    document.getElementById('mute-btn').textContent = muted ? '' : '';
  };

  //  INITIALIZE 
  initBtn.addEventListener('click', () => {
    initBtn.disabled = true;
    initBtn.style.display = 'none';
    restartGif(gifIntro);
    showOnly(gifIntro);

    setTimeout(() => {
      restartGif(gifActive);
      showOnly(gifActive);
      deactBtn.style.display = 'block';
    }, INTRO_DURATION);
  });

  //  DEACTIVATE 
  deactBtn.addEventListener('click', () => {
    deactBtn.disabled = true;
    deactBtn.style.display = 'none';
    restartGif(gifRetract);
    showOnly(gifRetract);

    setTimeout(() => {
      restartGif(gifIdle);
      showOnly(gifIdle);
      initBtn.style.display = 'block';
      initBtn.disabled = false;
    }, RETRACT_DURATION);
  });
</script>

</body>
</html>
