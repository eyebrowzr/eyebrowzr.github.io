<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EYEBROWZR</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-cyan: #00f5ff;
      --neon-pink: #ff00c8;
      --bg: #070714;
      --card-bg: #0e0e2a;
      --text: #e0e0ff;
      --green: #00ff41;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* CRT scanlines — only on body layer, below z-index 10 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* SCENE */
    #scene {
      position: relative;
      width: min(560px, 95vw);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* MONITOR — add back 100px height */
    #monitor {
      width: 100%;
      background: #06060f;
      border: 3px solid #1a1a3a;
      border-radius: 14px;
      padding: 1rem 1.5rem 1.2rem;
      min-height: 100px;
      box-shadow:
        0 0 0 6px #0a0a18,
        0 0 0 9px #1a1a3a,
        0 0 50px rgba(0,245,255,0.12),
        inset 0 0 40px rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      position: relative;
      z-index: 2;
    }

    #monitor::after {
      content:'';
      position:absolute;
      bottom:10px; right:16px;
      width:6px; height:6px;
      border-radius:50%;
      background:#00f5ff;
      box-shadow:0 0 8px #00f5ff;
      animation: led 2s infinite;
    }
    @keyframes led { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* TERMINAL */
    #terminal {
      width: 100%;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.55rem, 1.8vw, 0.7rem);
      color: var(--green);
      text-shadow: 0 0 6px var(--green);
      line-height: 1.9;
      min-height: 60px;
    }

    .tline { display: block; }
    .cursor {
      display: inline-block;
      width: 7px; height: 0.9em;
      background: var(--green);
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 0.7s infinite;
    }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

    /* LOGO AREA — inside monitor */
    #logo-area {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      opacity: 0;
      transition: opacity 0.5s;
      position: relative;
    }

    #logo-area img {
      width: 100%;
      max-width: 480px;
      height: auto;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 8px #00f5ff) drop-shadow(0 0 20px #00f5ff);
    }

    /* ARM LAYER — position handled by JS */
    #arm-layer {
      position: absolute;
      top: -60px;
      width: min(180px, 34vw);
      z-index: 10;
      pointer-events: none;
      transform: translateX(-50%);
    }

    #arm-layer img {
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      position: absolute;
      top: 0;
      left: 0;
      display: none;
    }

    #arm-layer img.visible {
      display: block;
      position: relative;
    }

    /* KEYBOARD PANEL — fixed height to prevent layout shift */
    #keyboard {
      width: 100%;
      background: #08081a;
      border: 2px solid #1a1a3a;
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 1rem;
      height: 70px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      box-shadow: 0 6px 30px rgba(0,0,0,0.5);
      position: relative;
      z-index: 2;
    }

    .splash-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.5rem, 1.5vw, 0.65rem);
      letter-spacing: 2px;
      background: transparent;
      padding: 0.7rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid;
    }

    #init-btn {
      color: var(--green);
      border-color: var(--green);
      text-shadow: 0 0 8px var(--green);
      animation: btnpulse 2s infinite;
    }
    @keyframes btnpulse {
      0%,100%{box-shadow:0 0 10px rgba(0,255,65,0.2)}
      50%{box-shadow:0 0 22px rgba(0,255,65,0.5)}
    }
    #init-btn:hover { background: rgba(0,255,65,0.08); }
    #init-btn:disabled { opacity: 0.3; cursor: not-allowed; animation: none; }

    #deactivate-btn {
      color: var(--neon-pink);
      border-color: var(--neon-pink);
      text-shadow: 0 0 8px var(--neon-pink);
      display: none;
      box-shadow: 0 0 10px rgba(255,0,200,0.2);
      animation: deactivatepulse 2s infinite;
    }
    @keyframes deactivatepulse {
      0%,100%{box-shadow:0 0 10px rgba(255,0,200,0.2)}
      50%{box-shadow:0 0 22px rgba(255,0,200,0.5)}
    }
    #deactivate-btn:hover { background: rgba(255,0,200,0.08); }
    #deactivate-btn:disabled { opacity: 0.3; cursor: not-allowed; animation: none; }

    /* MUTE */
    #mute-btn {
      position: fixed;
      top: 1rem; right: 1rem;
      background: transparent;
      border: 1px solid rgba(0,245,255,0.25);
      color: rgba(0,245,255,0.5);
      font-size: 1rem;
      padding: 0.35rem 0.55rem;
      cursor: pointer;
      border-radius: 4px;
      z-index: 500;
      transition: all 0.2s;
    }
    #mute-btn:hover { color: #00f5ff; border-color: #00f5ff; }

    /* SMOOTH TRANSITIONS */
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    .fade-out { animation: fadeOut 0.5s ease forwards; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes fadeOut { from{opacity:1} to{opacity:0} }

    @keyframes glitch {
      0%{transform:translate(0);filter:none}
      25%{transform:translate(-2px,1px);filter:hue-rotate(90deg)}
      50%{transform:translate(2px,-1px);filter:hue-rotate(200deg)}
      75%{transform:translate(-1px,2px);filter:hue-rotate(300deg)}
      100%{transform:translate(0);filter:none}
    }
    .glitching { animation: glitch 0.08s infinite; }
  </style>
</head>
<body>

<button id="mute-btn"></button>

<div id="scene">

  <!-- MONITOR -->
  <div id="monitor">
    <div id="terminal">
      <span class="tline" id="l1"></span>
      <span class="tline" id="l2"></span>
      <span class="tline" id="l3"></span>
      <span class="cursor" id="cur"></span>
    </div>
    <div id="logo-area">
      <img id="logo-anim" src="eyebrowzr_wireframe_animation_no_eye.gif" alt="EYEBROWZR" style="display:none;"/>
      <img id="logo-static" src="eyebrowzr_wireframe_no_eye.png" alt="EYEBROWZR" style="display:none;"/>
    </div>
  </div>

  <!-- ARM LAYER — floats in front of monitor -->
  <div id="arm-layer">
    <img id="arm-gif"     src="eyebrowzr_arm.gif"            alt="arm"/>
    <img id="idle-gif"    src="eyebrowzr_arm_idle_loop.gif"  alt="idle"/>
    <img id="retract-gif" src="eyebrowzr_arm_retract.gif"    alt="retract"/>
  </div>

  <!-- KEYBOARD PANEL -->
  <div id="keyboard">
    <button class="splash-btn" id="init-btn">[ INITIALIZE ]</button>
    <button class="splash-btn" id="deactivate-btn">[ DEACTIVATE ]</button>
  </div>

</div>

<script>
  //  DYNAMIC ARM POSITIONING 
  // O gap is at ~67% from left of the logo image
  const O_GAP_RATIO = 0.67;

  function positionArm() {
    const logo = document.getElementById('logo-static');
    const armLayer = document.getElementById('arm-layer');
    const scene = document.getElementById('scene');

    // Get logo rendered bounds
    const logoRect = logo.getBoundingClientRect();
    const sceneRect = scene.getBoundingClientRect();

    // Calculate O gap position relative to scene
    const oGapX = (logoRect.left - sceneRect.left) + (logoRect.width * O_GAP_RATIO);

    // Set arm left position
    armLayer.style.left = oGapX + 'px';
  }

  // Run after logo loads and on resize/rotate
  const logoStatic = document.getElementById('logo-static');
  logoStatic.addEventListener('load', positionArm);
  window.addEventListener('resize', positionArm);
  window.addEventListener('orientationchange', () => {
    setTimeout(positionArm, 300); // small delay for orientation to settle
  });

  // Run immediately in case image is already cached
  if (logoStatic.complete) positionArm();
  let muted = false;
  document.getElementById('mute-btn').onclick = () => {
    muted = !muted;
    document.getElementById('mute-btn').textContent = muted ? '' : '';
  };

  //  TERMINAL 
  function typeEl(el, text, speed) {
    return new Promise(res => {
      let i = 0;
      const cur = document.getElementById('cur');
      el.parentNode.insertBefore(cur, el.nextSibling);
      const t = setInterval(() => {
        el.textContent += text[i++];
        if (i >= text.length) { clearInterval(t); setTimeout(res, 250); }
      }, speed);
    });
  }

  async function runTerminal() {
    await typeEl(document.getElementById('l1'), '> SYSTEM BOOT........OK', 38);
    await typeEl(document.getElementById('l2'), '> LOADING EYEBROWZR.EXE', 32);
    await typeEl(document.getElementById('l3'), '> READY TO INITIALIZE', 38);
  }
  setTimeout(runTerminal, 500);

  //  TIMINGS 
  const ARM_DURATION     = 9000;
  const RETRACT_DURATION = 4300;
  const LASER_DURATION   = 5800;

  //  ELEMENTS 
  const initBtn       = document.getElementById('init-btn');
  const deactivateBtn = document.getElementById('deactivate-btn');
  const armGif        = document.getElementById('arm-gif');
  const idleGif       = document.getElementById('idle-gif');
  const retractGif    = document.getElementById('retract-gif');
  const logoAnim      = document.getElementById('logo-anim');
  const logoStatic    = document.getElementById('logo-static');
  const logoArea      = document.getElementById('logo-area');
  const terminal      = document.getElementById('terminal');

  function lockBtns() {
    initBtn.disabled = true;
    deactivateBtn.disabled = true;
  }

  // Force GIF to restart from frame 1 by resetting src
  function restartGif(el) {
    const src = el.src;
    el.src = '';
    el.src = src;
  }

  function showArm(el) {
    ['arm-gif','idle-gif','retract-gif'].forEach(id => {
      const img = document.getElementById(id);
      img.classList.remove('visible');
    });
    restartGif(el);
    el.classList.add('visible');
  }

  function show(el) {
    el.style.display = 'block';
  }

  function hide(el, cb) {
    el.style.display = 'none';
    if (cb) cb();
  }

  function glitchTerminal(cb) {
    const gc = '!@#$%^&*<>/\\[]{}01';
    terminal.classList.add('glitching');
    const gi = setInterval(() => {
      ['l1','l2','l3'].forEach(id => {
        document.getElementById(id).textContent =
          '> ' + Array.from({length:18}, () => gc[Math.floor(Math.random()*gc.length)]).join('');
      });
    }, 80);
    setTimeout(() => {
      clearInterval(gi);
      terminal.classList.remove('glitching');
      cb();
    }, 800);
  }

  function setTerminal(l1='', l2='', l3='') {
    document.getElementById('l1').textContent = l1;
    document.getElementById('l2').textContent = l2;
    document.getElementById('l3').textContent = l3;
  }

  //  INITIALIZE 
  let initialized = false;
  initBtn.addEventListener('click', () => {
    if (initialized) return;
    initialized = true;
    lockBtns();
    document.getElementById('cur').style.display = 'none';
    initBtn.style.display = 'none';

    glitchTerminal(() => {
      setTerminal('> INITIALIZING EYEBROWZR...');

      // Show arm
      showArm(armGif);

      // After arm finishes
      setTimeout(() => {
        showArm(idleGif);

          // Show logo animation — restart from frame 1
          logoArea.style.opacity = '1';
          restartGif(logoAnim);
          show(logoAnim);
          setTerminal('> RENDERING WORDMARK...');

          // After laser trace
          setTimeout(() => {
            hide(logoAnim, () => show(logoStatic));
            setTerminal('> SYSTEM ONLINE. ', '> WELCOME TO EYEBROWZR');

            // Show deactivate
            deactivateBtn.style.display = 'block';
            deactivateBtn.disabled = false;

          }, LASER_DURATION);

      }, ARM_DURATION);
    });
  });

  //  DEACTIVATE 
  deactivateBtn.addEventListener('click', () => {
    lockBtns();
    deactivateBtn.style.display = 'none';

    hide(idleGif);
    restartGif(retractGif);
    showArm(retractGif);
    hide(logoStatic);
    logoArea.style.opacity = '0';
    setTerminal('> DEACTIVATING...');

    setTimeout(() => {
      hide(retractGif, () => {
        initialized = false;
        setTerminal('> SYSTEM STANDBY.', '> READY TO INITIALIZE');
        document.getElementById('cur').style.display = 'inline-block';
        initBtn.style.display = 'block';
        initBtn.disabled = false;
      });
    }, RETRACT_DURATION);
  });
</script>

</body>
</html>
